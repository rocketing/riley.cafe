<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riley</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #2a1a3a, #3b1f4d, #4a2c5a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      width: 820px;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 0 40px rgba(255, 182, 255, 0.2);
      text-align: center;
    }

    .navbar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }

    .nav-btn {
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .nav-btn.active, .nav-btn:hover {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 3px solid rgba(255,255,255,0.3);
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 42px;
      color: #f5b6ff;
      text-shadow: 0 0 10px #f5b6ff;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #f5b6ff; }
      to { text-shadow: 0 0 20px #ffccff; }
    }

    .bio {
      margin: 8px 0 15px;
      font-size: 15px;
      color: #ddd;
    }

    .tab {
      display: none;
      animation: fade 0.4s ease;
    }

    .tab.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .links a {
      display: inline-block;
      margin: 5px 10px;
      color: #f5b6ff;
      text-decoration: none;
      transition: 0.3s;
    }

    .links a:hover {
      text-shadow: 0 0 10px #fff;
    }

    .song {
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      padding: 10px 15px;
      border-radius: 16px;
    }

    .song img {
      width: 55px;
      height: 55px;
      border-radius: 10px;
    }

    .song-info b { display: block; }

    .friends {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .friend {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 16px;
      transition: 0.3s;
      width: 100px;
    }

    .friend:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .friend img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 5px;
    }

    .friend-name { font-size: 14px; color: #f5b6ff; }
    .friend-pronouns { font-size: 12px; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">

    <div class="navbar">
      <div class="nav-btn active" onclick="switchTab('about')">about</div>
      <div class="nav-btn" onclick="switchTab('friends')">friends</div>
    </div>

    <img src="https://avatars.githubusercontent.com/u/212234964?v=4" class="avatar">
    <h1>Riley</h1>
    <div class="bio">transgirl — 16 — UK</div>

    <div id="about" class="tab active">
      <div class="links">
        <a href="https://discord.com/users/1142433636822548601" target="_blank">Discord</a>
        <a href="https://github.com/rocketing" target="_blank">GitHub</a>
        <a href="https://open.spotify.com/user/31kcl3foiantv5wvv4cryp2k5pbi" target="_blank">Spotify</a>
        <a href="https://www.tiktok.com/@2rileeey" target="_blank">TikTok</a>
        <a href="https://x.com/rileyrileyrile0" target="_blank">Twitter</a>
      </div>

      <div class="song" id="songBox">
        <img id="cover" src="" alt="cover">
        <div class="song-info">
          <b id="title">Loading...</b>
          <span id="artist"></span>
        </div>
      </div>
    </div>

    <div id="friends" class="tab">
      <div class="friends">
        <div class="friend">
          <img src="assets/cleo.png">
          <div class="friend-name">Cleo 💘</div>
          <div class="friend-pronouns">she/her</div>
        </div>
        <div class="friend">
          <img src="assets/tara.png">
          <div class="friend-name">Tara</div>
          <div class="friend-pronouns">she/her</div>
        </div>
        <div class="friend">
          <img src="assets/fir.png">
          <div class="friend-name">Fir</div>
          <div class="friend-pronouns">she/her</div>
        </div>
        <div class="friend">
          <img src="assets/reagan.png">
          <div class="friend-name">Reagan</div>
          <div class="friend-pronouns">she/her</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    async function getSong() {
      try {
        const res = await fetch("https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=meowriley&api_key=f547fa1a4962c6b5f3db6702db5892f0&format=json&limit=1");
        const data = await res.json();
        const track = data.recenttracks.track[0];

        document.getElementById("title").textContent = track.name;
        document.getElementById("artist").textContent = track.artist['#text'];
        document.getElementById("cover").src = track.image[2]['#text'];
      } catch {
        document.getElementById("title").textContent = "No song found";
      }
    }

    getSong();
    setInterval(getSong, 15000);
  </script>
</body>
</html>
